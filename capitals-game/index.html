<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capitals Game</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css" />
  <style>
    /* flag-icons sizing — the library uses em-based width, so it scales with
       the surrounding font-size. Nudge vertical alignment to sit on the baseline. */
    .fi { vertical-align: -0.125em; }
    /* ── Theme tokens ─────────────────────────────────────────────────────────
       All colours in this file use CSS custom properties.
       :root defines the default dark theme.
       body.light-theme overrides every token for the outdoor high-contrast mode.
       Globe canvas colours (--globe-*) are read by map.js via getComputedStyle
       so the canvas also respects the active theme.                           */

    :root {
      --bg-base:        #0a0e1a;   /* body, ocean, deep backgrounds */
      --bg-card:        #0f1e30;   /* input, cards, tooltips */
      --bg-hover:       #163d5e;   /* hover / active-button fill */
      --border:         #2e7ab5;   /* primary borders */
      --border-subtle:  #163d5e;   /* card dividers, subtle lines */
      --text-primary:   #e8eaf6;   /* main readable text */
      --text-secondary: #5c9fd4;   /* labels, slot numbers, round header */
      --text-muted:     #8ab4cc;   /* country names, placeholder */
      --text-highlight: #a8d8f0;   /* distances, share text */
      /* round-end state banners */
      --bg-won:         #052e16;  --border-won:  #22c55e;  --text-won:  #86efac;
      --bg-fail:        #1a0f0f;  --border-fail: #7f1d1d;  --text-fail: #fca5a5;
      /* globe canvas — read by map.js */
      --globe-ocean:       #0a0e1a;
      --globe-land:        #111827;
      --globe-land-stroke: rgba(255,255,255,0.22);
      --globe-lake:        #0a0e1a;
      --globe-lake-stroke: rgba(255,255,255,0.22);
      --globe-rim:         #163d5e;
      --globe-grid:        #1e3a52;
      --globe-grid-eq:     #2e5070;
      --globe-dot:         #2e7ab5;
    }

    /* Outdoor / high-contrast light theme
       Designed for direct sunlight: pure white cards, near-black text,
       vivid globe colours with strong land/ocean contrast.                   */
    body.light-theme {
      --bg-base:        #d8e8f5;
      --bg-card:        #ffffff;
      --bg-hover:       #b8d4ee;
      --border:         #2e7ab5;
      --border-subtle:  #90b8d8;
      --text-primary:   #06111e;
      --text-secondary: #1a4d80;
      --text-muted:     #2d6fa8;
      --text-highlight: #0a3560;
      /* round-end state banners */
      --bg-won:         #dcfce7;  --border-won:  #16a34a;  --text-won:  #14532d;
      --bg-fail:        #fee2e2;  --border-fail: #dc2626;  --text-fail: #7f1d1d;
      /* globe canvas */
      --globe-ocean:       #1565a8;
      --globe-land:        #4a7c59;
      --globe-land-stroke: rgba(0,0,0,0.3);
      --globe-lake:        #1565a8;
      --globe-lake-stroke: rgba(0,0,0,0.3);
      --globe-rim:         #0a3560;
      --globe-grid:        rgba(0,50,120,0.25);
      --globe-grid-eq:     rgba(0,50,120,0.5);
      --globe-dot:         #f0f5fa;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background 0.2s, color 0.2s;
    }

    /* Compact header — flex row: back-link | center controls | theme btn */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.45rem 1rem;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .header-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
      flex: 1;
      min-width: 0;
    }

    .back-link {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .back-link:hover { color: var(--text-highlight); }

    #theme-btn {
      flex-shrink: 0;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-secondary);
      padding: 0.3rem 0.7rem;
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
    }
    #theme-btn:hover { border-color: var(--text-secondary); color: var(--text-primary); }

    .mode-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .mode-btn {
      padding: 0.35rem 1rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .mode-btn.active {
      background: var(--bg-hover);
      color: var(--text-primary);
      border-color: var(--text-secondary);
    }
    .mode-btn:hover:not(.active) { border-color: var(--text-secondary); color: var(--text-primary); }

    .diff-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }

    .diff-btn {
      padding: 0.25rem 0.85rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .diff-btn.active {
      background: var(--bg-hover);
      color: var(--text-primary);
      border-color: var(--text-secondary);
    }
    .diff-btn:hover:not(.active) { border-color: var(--text-secondary); color: var(--text-primary); }

    #new-game-btn {
      padding: 0.35rem 1rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 0.85rem;
      cursor: pointer;
      display: none;
    }
    #new-game-btn:hover { border-color: var(--text-secondary); color: var(--text-primary); }

    main {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 0.75rem;
      padding: 0.75rem;
      overflow: hidden;
    }

    .left-col {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      min-height: 0;
    }

    /* Map container fills all remaining height in the left column.
       container-type: size enables cqw/cqh units on children so the
       globe can size itself to min(container-width, container-height). */
    #map-container {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      container-type: size;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Globe wrap — always a square equal to whichever container dimension is smaller.
       min(100cqw, 100cqh) is the CSS-native way to inscribe a square inside a rectangle. */
    #map-container > div {
      position: relative !important;
      display: block !important;
      width: min(100cqw, 100cqh);
      height: min(100cqw, 100cqh);
    }

    .globe-canvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 50%;
    }

    #right-col {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      overflow-y: auto;
      min-height: 0;
    }

    /* Round header */
    .round-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.45rem 0.8rem;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .round-header .round-score {
      font-weight: 700;
      color: var(--text-highlight);
    }

    /* Input */
    .input-wrap { position: relative; }

    .input-wrap input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 1rem;
      outline: none;
    }
    .input-wrap input:focus { border-color: var(--text-secondary); }
    .input-wrap input:disabled { opacity: 0.4; cursor: not-allowed; }
    .input-wrap input::placeholder { color: var(--text-muted); }

    #suggestions {
      position: absolute;
      z-index: 10;
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 10px 10px;
      list-style: none;
      display: none;
    }
    #suggestions li {
      padding: 0.6rem 1rem;
      cursor: pointer;
      font-size: 0.95rem;
      color: var(--text-primary);
    }
    #suggestions li:hover, #suggestions li.active { background: var(--bg-hover); }

    /* Flat SVG map (dead code) */
    .world-map {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border-subtle);
    }
    .capital-dot { cursor: pointer; }
    .capital-dot:hover circle { opacity: 1; fill: var(--text-highlight); }

    /* Globe — sizing handled by #map-container > div rule above */

    .map-tooltip {
      position: absolute;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 0.8rem;
      color: var(--text-primary);
      pointer-events: none;
      white-space: nowrap;
      z-index: 20;
    }

    .map-controls {
      position: absolute;
      bottom: 8px;
      right: 8px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .map-controls button {
      width: 28px;
      height: 28px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-highlight);
      font-size: 1rem;
      cursor: pointer;
      line-height: 1;
    }
    .map-controls button:hover { background: var(--bg-hover); }

    /* Results */
    .guess-card {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0.8rem;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      min-height: 52px;
    }
    .guess-card.empty { opacity: 0.4; }
    .guess-card.correct { border-color: #22c55e; }

    .slot-num {
      width: 1.4rem;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .flag { font-size: 1.5rem; flex-shrink: 0; }

    .guess-info { flex: 1; display: flex; flex-direction: column; }
    .guess-info strong { font-size: 0.95rem; color: var(--text-primary); }
    .country-name { font-size: 0.75rem; color: var(--text-muted); }

    .distance-block { text-align: right; flex-shrink: 0; width: 110px; }
    .dist-label { font-size: 0.75rem; color: var(--text-highlight); }

    .heat-bar-bg {
      margin-top: 4px;
      height: 4px;
      background: var(--border-subtle);
      border-radius: 2px;
      overflow: hidden;
    }
    .heat-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    .game-over-msg {
      text-align: center;
      padding: 0.8rem;
      background: var(--bg-fail);
      border: 1px solid var(--border-fail);
      border-radius: 8px;
      font-size: 0.95rem;
      color: var(--text-fail);
    }

    .won-banner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 0.8rem;
      background: var(--bg-won);
      border: 1px solid var(--border-won);
      border-radius: 8px;
      color: var(--text-won);
      font-weight: 600;
    }

    .next-round-btn {
      width: 100%;
      padding: 0.55rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-hover);
      color: var(--text-primary);
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 600;
    }
    .next-round-btn:hover { border-color: var(--text-secondary); }

    .session-total {
      text-align: center;
      padding: 0.8rem;
      background: var(--bg-card);
      border: 1px solid var(--text-secondary);
      border-radius: 8px;
      color: var(--text-highlight);
      font-size: 1.1rem;
      font-weight: 700;
    }

    /* Share */
    .share-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
    }
    .share-text {
      font-family: monospace;
      font-size: 0.85rem;
      line-height: 1.7;
      color: var(--text-highlight);
      margin-bottom: 0.75rem;
      white-space: pre;
    }
    #copy-btn {
      width: 100%;
      padding: 0.5rem;
      background: var(--bg-hover);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 0.9rem;
      cursor: pointer;
    }
    #copy-btn:hover { border-color: var(--text-secondary); }

    #loading {
      text-align: center;
      padding: 4rem;
      color: var(--text-secondary);
      font-size: 1.1rem;
      grid-column: 1 / -1;
    }

    @media (max-width: 640px) {
      /* On mobile: allow page to scroll rather than being locked to viewport height */
      body { height: auto; min-height: 100dvh; overflow-y: auto; }
      main { grid-template-columns: 1fr; overflow: visible; height: auto; }
      #right-col { overflow-y: visible; }
      /* On mobile the container is unconstrained vertically, so cqh = 0.
         Fall back to full column width for the globe size. */
      #map-container { flex: none; container-type: inline-size; }
      #map-container > div { width: 100cqw; height: 100cqw; }
      header { flex-wrap: wrap; gap: 0.5rem; }
    }
  </style>
</head>
<body>

<header>
  <a class="back-link" href="../index.html">← Home</a>
  <div class="header-center">
    <div class="mode-bar">
      <button class="mode-btn active" id="daily-btn">📅 Daily</button>
      <button class="mode-btn" id="random-btn">🎲 Random</button>
      <button id="new-game-btn">↺ New game</button>
    </div>
    <div class="diff-bar" id="diff-bar"></div>
  </div>
  <button id="theme-btn" title="Switch to outdoor mode">☀️ Outdoor</button>
</header>

<main id="main">
  <div id="loading">Loading…</div>
</main>

<script type="module">
  // ── Wiring layer ─────────────────────────────────────────────────────────────
  // index.html is the only file that imports from multiple layers.
  // It owns: session/round lifecycle, mode (daily/random), difficulty selection,
  // theme toggling, and routing events between the lib/ logic modules and the
  // ui/ display modules.  No game logic lives here — it delegates entirely.
  //
  // Session structure:
  //   A session = 5 rounds.  Each round has one mystery capital.
  //   Session state: targets[], currentRound (0–4), roundResults[]
  //   Round state: game object (from game.js), guessedCapitals Set
  //
  // Data flow per guess:
  //   input.js or map.js  →  onGuess(capital)
  //   →  game.submitGuess(capital)  →  newState
  //   →  map.update(newState) + renderResults(newState)
  //   →  if done: endRound() → calcScore() → push to roundResults[]
  //   →  if last round: endSession() → share()

  import { getDailyTargets } from './lib/daily_target.js';
  import { createGame } from './lib/game.js';
  import { createInput } from './ui/input.js';
  import { createMap } from './ui/map.js';
  import { renderResults } from './ui/results.js';
  import { share } from './ui/share.js';
  import { DIFFICULTIES } from './lib/difficulty.js';
  import { createDifficultyPicker } from './ui/difficulty_picker.js';
  import { calcScore } from './lib/scoring.js';

  const ROUNDS = 5; // capitals per session
  const main = document.getElementById('main');
  const dailyBtn = document.getElementById('daily-btn');
  const randomBtn = document.getElementById('random-btn');
  const newGameBtn = document.getElementById('new-game-btn');
  const themeBtn = document.getElementById('theme-btn');

  // Declared early so applyTheme() (called before await) can reference them safely
  let inputCtrl, mapCtrl;

  // ── Theme ─────────────────────────────────────────────────────────────────
  // isDark drives a .light-theme class on <body>.  The CSS variables in
  // :root vs body.light-theme handle all UI colours; the globe canvas reads
  // its colours via map.js's getThemeColors() → mapCtrl.applyTheme().

  let isDark = localStorage.getItem('theme') !== 'light';

  function applyTheme() {
    document.body.classList.toggle('light-theme', !isDark);
    themeBtn.textContent = isDark ? '☀️ Outdoor' : '🌙 Dark';
    themeBtn.title = isDark ? 'Switch to outdoor mode' : 'Switch to dark mode';
    if (mapCtrl) mapCtrl.applyTheme(); // redraw globe with new canvas colours
  }

  themeBtn.addEventListener('click', () => {
    isDark = !isDark;
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    applyTheme();
  });

  // Apply persisted theme before building UI so the globe reads the right colours
  applyTheme();

  // ── Data loading ──────────────────────────────────────────────────────────
  // Load capitals first (30 KB) — enough to build the globe and pick targets.
  // Distances (1.2 MB) loads in the background; startSession() shows a skeleton
  // and startRound() fires only once the promise resolves.
  const capitals = await fetch('./data/capitals.json').then(r => r.json());
  const distancesPromise = fetch('./data/distances.json').then(r => r.json());
  let distances = null; // set when distancesPromise resolves

  let mode = 'daily';
  let difficultyKey = localStorage.getItem('difficulty') || 'moderate';

  // Session state — reset at the start of every session
  let targets = [];      // 5 capital objects chosen for this session
  let currentRound = 0;  // index into targets[] (0–4)
  let roundResults = []; // [{ target, guesses[], score, won }, …] — one per completed round

  // Round state — reset at the start of every round
  let game;              // current game.js instance
  let guessedCapitals;   // Set of capital names already submitted this round (prevents duplicates)

  main.innerHTML = `
    <div class="left-col">
      <div id="input-container"></div>
      <div id="map-container"></div>
    </div>
    <div id="right-col">
      <div id="round-header"></div>
      <div id="results-container"></div>
      <div id="share-container"></div>
    </div>
  `;

  createDifficultyPicker(
    document.getElementById('diff-bar'),
    difficultyKey,
    key => {
      difficultyKey = key;
      localStorage.setItem('difficulty', key);
      rebuildMap();
      startSession();
    }
  );

  inputCtrl = createInput(document.getElementById('input-container'), capitals, handleGuess);

  function rebuildMap() {
    const mapContainer = document.getElementById('map-container');
    mapContainer.innerHTML = '';
    mapCtrl = createMap(mapContainer, capitals, handleGuess, DIFFICULTIES[difficultyKey]);
    // Ensure the freshly built globe uses the current theme colours
    applyTheme();
  }

  rebuildMap();

  function getTargets() {
    const d = new Date();
    const today = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (mode === 'daily') return getDailyTargets(capitals, today);
    const shuffled = [...capitals].sort(() => Math.random() - 0.5);
    return shuffled.slice(0, ROUNDS);
  }

  function renderRoundHeader() {
    const score = roundResults.reduce((s, r) => s + r.score, 0);
    document.getElementById('round-header').innerHTML = `
      <div class="round-header">
        <span>Capital ${currentRound + 1} of ${ROUNDS}</span>
        <span class="round-score">${score} pts</span>
      </div>
    `;
  }

  function startSession() {
    targets = getTargets();
    currentRound = 0;
    roundResults = [];
    document.getElementById('share-container').innerHTML = '';
    if (distances) {
      startRound();
    } else {
      // Show skeleton while distances.json finishes loading
      renderRoundHeader();
      document.getElementById('results-container').innerHTML =
        '<div style="text-align:center;color:var(--text-secondary);padding:1.5rem;font-size:0.9rem">Loading…</div>';
      inputCtrl.disable();
      distancesPromise.then(d => { distances = d; startRound(); });
    }
  }

  function startRound() {
    game = createGame(targets[currentRound], distances, difficultyKey);
    guessedCapitals = new Set();
    mapCtrl.reset();
    inputCtrl.enable();
    inputCtrl.clear();
    inputCtrl.focus();
    renderRoundHeader();
    renderResults(
      document.getElementById('results-container'),
      [], 'playing', targets[currentRound],
      DIFFICULTIES[difficultyKey].maxGuesses
    );
  }

  function handleGuess(capital) {
    if (!game) return; // distances not yet loaded
    const state = game.getState();
    if (state.status !== 'playing') return;
    if (guessedCapitals.has(capital.capital)) return;
    guessedCapitals.add(capital.capital);

    const newState = game.submitGuess(capital);
    mapCtrl.update(newState.guesses, newState.status, newState.target);
    renderResults(
      document.getElementById('results-container'),
      newState.guesses, newState.status, newState.target,
      DIFFICULTIES[difficultyKey].maxGuesses
    );

    if (newState.status === 'won' || newState.status === 'lost') {
      endRound(newState);
    }
  }

  function endRound(state) {
    inputCtrl.disable();
    const won = state.status === 'won';
    const score = calcScore(state.guesses.length, won);
    roundResults.push({ target: state.target, guesses: state.guesses, score, won });
    renderRoundHeader();

    const isLast = currentRound === ROUNDS - 1;
    const resultsEl = document.getElementById('results-container');

    if (won) {
      const label = state.guesses.length === 1 ? 'First guess!' : `Got it in ${state.guesses.length}!`;
      resultsEl.insertAdjacentHTML('beforeend', `
        <div class="won-banner">
          <span>🎉 ${label}</span>
          <strong>+${score} pts</strong>
        </div>
      `);
    }

    if (!isLast) {
      resultsEl.insertAdjacentHTML('beforeend', `
        <button class="next-round-btn" id="next-round-btn">Next Capital →</button>
      `);
      document.getElementById('next-round-btn').addEventListener('click', () => {
        currentRound++;
        startRound();
      });
    } else {
      endSession();
    }
  }

  function endSession() {
    const total = roundResults.reduce((s, r) => s + r.score, 0);
    document.getElementById('results-container').insertAdjacentHTML('beforeend', `
      <div class="session-total">Final score: ${total} / ${ROUNDS * 200}</div>
    `);
    share(document.getElementById('share-container'), roundResults, difficultyKey);
  }

  dailyBtn.addEventListener('click', () => {
    if (mode === 'daily') return;
    mode = 'daily';
    dailyBtn.classList.add('active');
    randomBtn.classList.remove('active');
    newGameBtn.style.display = 'none';
    startSession();
  });

  randomBtn.addEventListener('click', () => {
    mode = 'random';
    randomBtn.classList.add('active');
    dailyBtn.classList.remove('active');
    newGameBtn.style.display = 'inline-block';
    startSession();
  });

  newGameBtn.addEventListener('click', startSession);

  startSession();
</script>

</body>
</html>
