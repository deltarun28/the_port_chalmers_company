<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capitals Game</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0e1a;
      color: #e8eaf6;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 1.2rem 1rem 0.6rem;
      border-bottom: 1px solid #163d5e;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #e8eaf6, #5c9fd4, #a8d8f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .back-link {
      position: absolute;
      top: 1.2rem;
      left: 1rem;
      color: #5c9fd4;
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .back-link:hover { color: #a8d8f0; }

    .mode-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.7rem;
    }

    .mode-btn {
      padding: 0.35rem 1rem;
      border-radius: 20px;
      border: 1px solid #2e7ab5;
      background: transparent;
      color: #8ab4cc;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .mode-btn.active {
      background: #163d5e;
      color: #e8eaf6;
      border-color: #5c9fd4;
    }
    .mode-btn:hover:not(.active) { border-color: #5c9fd4; color: #e8eaf6; }

    .diff-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.4rem;
    }

    .diff-btn {
      padding: 0.25rem 0.85rem;
      border-radius: 20px;
      border: 1px solid #2e7ab5;
      background: transparent;
      color: #8ab4cc;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .diff-btn.active {
      background: #163d5e;
      color: #e8eaf6;
      border-color: #5c9fd4;
    }
    .diff-btn:hover:not(.active) { border-color: #5c9fd4; color: #e8eaf6; }

    #new-game-btn {
      padding: 0.35rem 1rem;
      border-radius: 20px;
      border: 1px solid #2e7ab5;
      background: transparent;
      color: #8ab4cc;
      font-size: 0.85rem;
      cursor: pointer;
      display: none;
    }
    #new-game-btn:hover { border-color: #5c9fd4; color: #e8eaf6; }

    main {
      max-width: 880px;
      margin: 0 auto;
      padding: 1rem;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 1rem;
    }

    .left-col { display: flex; flex-direction: column; gap: 0.75rem; }

    #right-col { display: flex; flex-direction: column; gap: 0.5rem; }

    /* Round header */
    .round-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.45rem 0.8rem;
      background: #0f1e30;
      border: 1px solid #163d5e;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #5c9fd4;
    }
    .round-header .round-score {
      font-weight: 700;
      color: #a8d8f0;
    }

    /* Input */
    .input-wrap { position: relative; }

    .input-wrap input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #0f1e30;
      border: 1px solid #2e7ab5;
      border-radius: 10px;
      color: #e8eaf6;
      font-size: 1rem;
      outline: none;
    }
    .input-wrap input:focus { border-color: #5c9fd4; }
    .input-wrap input:disabled { opacity: 0.4; cursor: not-allowed; }

    #suggestions {
      position: absolute;
      z-index: 10;
      width: 100%;
      background: #0f1e30;
      border: 1px solid #2e7ab5;
      border-top: none;
      border-radius: 0 0 10px 10px;
      list-style: none;
      display: none;
    }
    #suggestions li {
      padding: 0.6rem 1rem;
      cursor: pointer;
      font-size: 0.95rem;
    }
    #suggestions li:hover, #suggestions li.active { background: #163d5e; }

    /* Flat SVG map */
    .world-map {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #163d5e;
    }
    .capital-dot { cursor: pointer; }
    .capital-dot:hover circle { opacity: 1; fill: #a8d8f0; }

    /* Globe */
    .globe-canvas {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 50%;
    }

    .map-tooltip {
      position: absolute;
      background: #0f1e30;
      border: 1px solid #2e7ab5;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 0.8rem;
      color: #e8eaf6;
      pointer-events: none;
      white-space: nowrap;
      z-index: 20;
    }

    .map-controls {
      position: absolute;
      bottom: 8px;
      right: 8px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .map-controls button {
      width: 28px;
      height: 28px;
      background: #0f1e30;
      border: 1px solid #2e7ab5;
      border-radius: 6px;
      color: #a8d8f0;
      font-size: 1rem;
      cursor: pointer;
      line-height: 1;
    }
    .map-controls button:hover { background: #163d5e; }

    /* Results */
    .guess-card {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0.8rem;
      background: #0f1e30;
      border: 1px solid #163d5e;
      border-radius: 8px;
      min-height: 52px;
    }
    .guess-card.empty { opacity: 0.4; }
    .guess-card.correct { border-color: #22c55e; }

    .slot-num {
      width: 1.4rem;
      text-align: center;
      font-size: 0.8rem;
      color: #5c9fd4;
      flex-shrink: 0;
    }
    .flag { font-size: 1.5rem; flex-shrink: 0; }

    .guess-info { flex: 1; display: flex; flex-direction: column; }
    .guess-info strong { font-size: 0.95rem; }
    .country-name { font-size: 0.75rem; color: #8ab4cc; }

    .distance-block { text-align: right; flex-shrink: 0; width: 110px; }
    .dist-label { font-size: 0.75rem; color: #a8d8f0; }

    .heat-bar-bg {
      margin-top: 4px;
      height: 4px;
      background: #163d5e;
      border-radius: 2px;
      overflow: hidden;
    }
    .heat-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    .game-over-msg {
      text-align: center;
      padding: 0.8rem;
      background: #1a0f0f;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #fca5a5;
    }

    .won-banner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 0.8rem;
      background: #052e16;
      border: 1px solid #22c55e;
      border-radius: 8px;
      color: #86efac;
      font-weight: 600;
    }

    .next-round-btn {
      width: 100%;
      padding: 0.55rem 1rem;
      border-radius: 8px;
      border: 1px solid #2e7ab5;
      background: #163d5e;
      color: #e8eaf6;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 600;
    }
    .next-round-btn:hover { background: #1e5f8a; }

    .session-total {
      text-align: center;
      padding: 0.8rem;
      background: #0f1e30;
      border: 1px solid #5c9fd4;
      border-radius: 8px;
      color: #a8d8f0;
      font-size: 1.1rem;
      font-weight: 700;
    }

    /* Share */
    .share-card {
      background: #0f1e30;
      border: 1px solid #2e7ab5;
      border-radius: 10px;
      padding: 1rem;
    }
    .share-text {
      font-family: monospace;
      font-size: 0.85rem;
      line-height: 1.7;
      color: #a8d8f0;
      margin-bottom: 0.75rem;
      white-space: pre;
    }
    #copy-btn {
      width: 100%;
      padding: 0.5rem;
      background: linear-gradient(135deg, #163d5e, #1e5f8a);
      border: 1px solid #2e7ab5;
      border-radius: 8px;
      color: #e8eaf6;
      font-size: 0.9rem;
      cursor: pointer;
    }
    #copy-btn:hover { background: #1e5f8a; }

    #loading {
      text-align: center;
      padding: 4rem;
      color: #5c9fd4;
      font-size: 1.1rem;
      grid-column: 1 / -1;
    }

    @media (max-width: 640px) {
      main { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<a class="back-link" href="../index.html">← Home</a>

<header>
  <h1>🌍 Capitals Game</h1>
  <div class="mode-bar">
    <button class="mode-btn active" id="daily-btn">📅 Daily</button>
    <button class="mode-btn" id="random-btn">🎲 Random</button>
    <button id="new-game-btn">↺ New game</button>
  </div>
  <div class="diff-bar" id="diff-bar"></div>
</header>

<main id="main">
  <div id="loading">Loading…</div>
</main>

<script type="module">
  // ── Wiring layer ─────────────────────────────────────────────────────────────
  // index.html is the only file that imports from multiple layers.
  // It owns: session/round lifecycle, mode (daily/random), difficulty selection,
  // and routing events between the lib/ logic modules and the ui/ display modules.
  // No game logic lives here — it delegates entirely to the imported modules.
  //
  // Session structure:
  //   A session = 5 rounds.  Each round has one mystery capital.
  //   Session state: targets[], currentRound (0–4), roundResults[]
  //   Round state: game object (from game.js), guessedCapitals Set
  //
  // Data flow per guess:
  //   input.js or map.js  →  onGuess(capital)
  //   →  game.submitGuess(capital)  →  newState
  //   →  map.update(newState) + renderResults(newState)
  //   →  if done: endRound() → calcScore() → push to roundResults[]
  //   →  if last round: endSession() → share()

  import { getDailyTargets } from './lib/daily_target.js';
  import { createGame } from './lib/game.js';
  import { createInput } from './ui/input.js';
  import { createMap } from './ui/map.js';
  import { renderResults } from './ui/results.js';
  import { share } from './ui/share.js';
  import { DIFFICULTIES } from './lib/difficulty.js';
  import { createDifficultyPicker } from './ui/difficulty_picker.js';
  import { calcScore } from './lib/scoring.js';

  const ROUNDS = 5; // capitals per session
  const main = document.getElementById('main');
  const dailyBtn = document.getElementById('daily-btn');
  const randomBtn = document.getElementById('random-btn');
  const newGameBtn = document.getElementById('new-game-btn');

  // Load capitals first (30 KB) — enough to build the globe and pick targets.
  // Distances (1.2 MB) loads in the background; startSession() shows a skeleton
  // and startRound() fires only once the promise resolves.
  const capitals = await fetch('./data/capitals.json').then(r => r.json());
  const distancesPromise = fetch('./data/distances.json').then(r => r.json());
  let distances = null; // set when distancesPromise resolves

  let mode = 'daily';
  let difficultyKey = localStorage.getItem('difficulty') || 'moderate';
  let inputCtrl, mapCtrl;

  // Session state — reset at the start of every session
  let targets = [];      // 5 capital objects chosen for this session
  let currentRound = 0;  // index into targets[] (0–4)
  let roundResults = []; // [{ target, guesses[], score, won }, …] — one per completed round

  // Round state — reset at the start of every round
  let game;              // current game.js instance
  let guessedCapitals;   // Set of capital names already submitted this round (prevents duplicates)

  main.innerHTML = `
    <div class="left-col">
      <div id="input-container"></div>
      <div id="map-container"></div>
    </div>
    <div id="right-col">
      <div id="round-header"></div>
      <div id="results-container"></div>
      <div id="share-container"></div>
    </div>
  `;

  createDifficultyPicker(
    document.getElementById('diff-bar'),
    difficultyKey,
    key => {
      difficultyKey = key;
      localStorage.setItem('difficulty', key);
      rebuildMap();
      startSession();
    }
  );

  inputCtrl = createInput(document.getElementById('input-container'), capitals, handleGuess);

  function rebuildMap() {
    const mapContainer = document.getElementById('map-container');
    mapContainer.innerHTML = '';
    mapCtrl = createMap(mapContainer, capitals, handleGuess, DIFFICULTIES[difficultyKey]);
  }

  rebuildMap();

  function getTargets() {
    const today = new Date().toISOString().slice(0, 10);
    if (mode === 'daily') return getDailyTargets(capitals, today, ROUNDS);
    const shuffled = [...capitals].sort(() => Math.random() - 0.5);
    return shuffled.slice(0, ROUNDS);
  }

  function renderRoundHeader() {
    const score = roundResults.reduce((s, r) => s + r.score, 0);
    document.getElementById('round-header').innerHTML = `
      <div class="round-header">
        <span>Capital ${currentRound + 1} of ${ROUNDS}</span>
        <span class="round-score">${score} pts</span>
      </div>
    `;
  }

  function startSession() {
    targets = getTargets();
    currentRound = 0;
    roundResults = [];
    document.getElementById('share-container').innerHTML = '';
    if (distances) {
      startRound();
    } else {
      // Show skeleton while distances.json finishes loading
      renderRoundHeader();
      document.getElementById('results-container').innerHTML =
        '<div style="text-align:center;color:#5c9fd4;padding:1.5rem;font-size:0.9rem">Loading…</div>';
      inputCtrl.disable();
      distancesPromise.then(d => { distances = d; startRound(); });
    }
  }

  function startRound() {
    game = createGame(targets[currentRound], distances, difficultyKey);
    guessedCapitals = new Set();
    mapCtrl.reset();
    inputCtrl.enable();
    inputCtrl.clear();
    inputCtrl.focus();
    renderRoundHeader();
    renderResults(
      document.getElementById('results-container'),
      [], 'playing', targets[currentRound],
      DIFFICULTIES[difficultyKey].maxGuesses
    );
  }

  function handleGuess(capital) {
    if (!game) return;
    const state = game.getState();
    if (state.status !== 'playing') return;
    if (guessedCapitals.has(capital.capital)) return;
    guessedCapitals.add(capital.capital);

    const newState = game.submitGuess(capital);
    mapCtrl.update(newState.guesses, newState.status, newState.target);
    renderResults(
      document.getElementById('results-container'),
      newState.guesses, newState.status, newState.target,
      DIFFICULTIES[difficultyKey].maxGuesses
    );

    if (newState.status === 'won' || newState.status === 'lost') {
      endRound(newState);
    }
  }

  function endRound(state) {
    inputCtrl.disable();
    const won = state.status === 'won';
    const score = calcScore(state.guesses.length, won);
    roundResults.push({ target: state.target, guesses: state.guesses, score, won });
    renderRoundHeader();

    const isLast = currentRound === ROUNDS - 1;
    const resultsEl = document.getElementById('results-container');

    if (won) {
      const label = state.guesses.length === 1 ? 'First guess!' : `Got it in ${state.guesses.length}!`;
      resultsEl.insertAdjacentHTML('beforeend', `
        <div class="won-banner">
          <span>🎉 ${label}</span>
          <strong>+${score} pts</strong>
        </div>
      `);
    }

    if (!isLast) {
      resultsEl.insertAdjacentHTML('beforeend', `
        <button class="next-round-btn" id="next-round-btn">Next Capital →</button>
      `);
      document.getElementById('next-round-btn').addEventListener('click', () => {
        currentRound++;
        startRound();
      });
    } else {
      endSession();
    }
  }

  function endSession() {
    const total = roundResults.reduce((s, r) => s + r.score, 0);
    document.getElementById('results-container').insertAdjacentHTML('beforeend', `
      <div class="session-total">Final score: ${total} / ${ROUNDS * 200}</div>
    `);
    share(document.getElementById('share-container'), roundResults, difficultyKey);
  }

  dailyBtn.addEventListener('click', () => {
    if (mode === 'daily') return;
    mode = 'daily';
    dailyBtn.classList.add('active');
    randomBtn.classList.remove('active');
    newGameBtn.style.display = 'none';
    startSession();
  });

  randomBtn.addEventListener('click', () => {
    mode = 'random';
    randomBtn.classList.add('active');
    dailyBtn.classList.remove('active');
    newGameBtn.style.display = 'inline-block';
    startSession();
  });

  newGameBtn.addEventListener('click', startSession);

  startSession();
</script>

</body>
</html>
